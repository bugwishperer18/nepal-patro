appId: com.bugwhisperer.nepalpatro
productName: Nepal Patro
copyright: Copyright © 2026 BugWhisperer
files:
  - index.html
  - app.js
  - styles.css
  - manifest.webmanifest
  - build/**
  - data/**
  - electron/**
  - vendor/**
mac:
  category: public.app-category.productivity
  icon: build/icon.png
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  hardenedRuntime: false
dmg:
  sign: false
  artifactName: Nepal-Patro-${version}-${arch}.${ext}
